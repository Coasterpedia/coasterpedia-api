services:
  coasterpediaapi:
    image: ghcr.io/coasterpedia/coasterpedia-api/api@${API_IMAGE}
    restart: always
    networks:
      - coasterpedia_web
    environment:
      ConnectionStrings__DefaultConnection: Server=${MYSQL_SERVER};database=${MYSQL_DATABASE};Uid=${MYSQL_USER};Pwd=${MYSQL_PASSWORD};Charset=utf8;
      SnsSettings__TopicArn: ${SNS_TOPIC_ARN}
    ports:
      - 8080:8080
    logging:
      driver: awslogs
      options:
        awslogs-region: eu-west-2
        awslogs-group: CoasterpediaApi
        awslogs-create-group: "true"
networks:
  coasterpedia_web:
    external: true